<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Drive File Sharing{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #f7f8fc;
      }
      .app-card {
        border: 0;
        border-radius: 14px;
        box-shadow: 0 10px 24px rgba(18, 38, 63, 0.08);
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/files/">Drive Sharing</a>
        <div class="d-flex">
          {% if user.is_authenticated %}
          {% if user.is_superuser %}
          <a class="btn btn-outline-info btn-sm me-2" href="/admin-dashboard/">
            Admin Dashboard
          </a>
          {% endif %}
          <a class="btn btn-outline-light btn-sm me-2" href="/logout/">Logout</a>
          {% else %}
          <a class="btn btn-outline-light btn-sm me-2" href="/login/">Login</a>
          {% endif %}
        </div>
      </div>
    </nav>

    <main class="container py-4">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>

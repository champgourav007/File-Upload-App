<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Drive File Sharing{% endblock %}</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="{% static 'css/modern.css' %}" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg" data-aos="fade-down">
      <div class="container">
        <a class="navbar-brand fw-bold fs-3" href="{% url 'files' %}">
          <span class="me-2">🚀</span>Drive Sharing
        </a>
        <div class="d-flex align-items-center">
          <!-- Dark Mode Toggle -->
          <div class="me-3">
            <label class="switch">
              <input type="checkbox" id="dark-toggle">
              <span class="slider"></span>
            </label>
          </div>
          {% if user.is_authenticated %}
          {% if user.is_superuser %}
          <a class="btn btn-outline-info btn-sm me-2" href="{% url 'admin_dashboard' %}">
            <i class="bi bi-gear me-1"></i>Admin
          </a>
          {% endif %}
<form method="post" action="{% url 'logout' %}" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-light btn-sm me-2">Logout</button>
          </form>
          {% else %}
          <a class="btn btn-outline-light btn-sm me-2" href="/login/">Login</a>
          {% endif %}
        </div>
      </div>
    </nav>

    <main class="container py-5 pb-4">
      {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'css/switch.css' %}" rel="stylesheet">
    <script src="{% static 'js/upload-enhance.js' %}"></script>
    <script src="{% static 'js/app.js' %}" async defer></script>
    <script src="{% static 'js/download-progress.js' %}"></script>
  </body>
</html>

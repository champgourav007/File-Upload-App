<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Drive Sharing</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(120deg, #0d6efd1c, #dc35451c);
      }
      .login-card {
        border: 0;
        border-radius: 16px;
        box-shadow: 0 10px 24px rgba(18, 38, 63, 0.12);
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
          <div class="card login-card p-4">
            <h3 class="mb-2">Sign in</h3>
            <p class="text-muted mb-4">Login to upload and share files.</p>

            {% if form.errors %}
            <div class="alert alert-danger py-2">
              Your username or password is incorrect.
            </div>
            {% endif %}

            <form method="post">
              {% csrf_token %}
              <div class="mb-3">
                <label class="form-label">Username</label>
                {{ form.username }}
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                {{ form.password }}
              </div>

              <button type="submit" class="btn btn-primary w-100">
                Login
              </button>
            </form>

            <div class="mt-3 text-center text-muted" style="font-size: 0.9rem">
              If you don’t have an account, ask an admin to create one.
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
